- title: "Advancing state estimation for lithium-ion batteries with hysteresis through systematic extended Kalman filter tuning"
  year: 2024
  url: "https://www.nature.com/articles/s41598-024-61596-0"
  authors:
    - jasper-knox
    - mark-blyth
    - alastair-hales
  summary: "This paper shows that hysteretic reduced-order battery models combined with adaptive extended Kalman filters significantly improve lithium-ion battery state-of-charge estimation, reducing both voltage prediction error and SOC estimation error compared with standard industry approaches."


- title: "A Standardised Potentiometric Method for the Effective Parameterisation of Reversible Heating in a Lithium-Ion Cell"
  year: 2024
  url: "https://iopscience.iop.org/article/10.1149/1945-7111/ad4918/meta"
  authors:
    - alastair-hales
    - james-bulman
  summary: "This paper presents a faster, standardised method for measuring entropy coefficients in lithium-ion cells, improving reversible heat generation modelling while identifying voltage relaxation effects that are important for accurate temperature prediction, safety and lifetime assessment."
