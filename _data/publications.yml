- title: "Lithium-ion battery second life: pathways, challenges and outlook"
  year: 2024
  url: "https://www.frontiersin.org/journals/chemistry/articles/10.3389/fchem.2024.1358417/full"
  authors:
    - "Anisha Patel"
    - "Laura Lander"
    - "Jyoti Ahuja"
    - james-bulman
    - "James Lum"
    - "Julian Pope"
    - alastair-hales
    - "Yatish Patel"
    - "Jacqueline Edge"
  summary: "This review assesses the recycling and second-life pathways available for end-of-life EV batteries, highlighting the need for clearer decision criteria, simplified processes, standardised battery design and supportive policy to improve circularity and sustainability."


  - title: "A Numerical Study of the Suitability of Phase-Change Materials for Battery Thermal Management in Flight Applications"
  year: 2023
  url: "https://www.mdpi.com/2032-6653/14/1/15"
  authors:
    - "Daeyeun Kim"
    - "Saber Abdallah"
    - "Gloria Bosi"
    - alastair-hales
  summary: "This paper numerically demonstrates that phase-change materials can provide passive, low-mass thermal management for electric aircraft battery packs, with latent heat of fusion, rather than thermal conductivity, being the key property for maintaining ideal temperatures during flight."

  - title: "Thermal Management Optimization for Large-Format Lithium-Ion Battery Using Cell Cooling Coefficient"
  year: 2022
  url: "https://iopscience.iop.org/article/10.1149/1945-7111/ac9d08/meta"
  authors:
    - "Yingchen Xie"
    - alastair-hales
    - "Ruihe Li"
    - "Xuning Feng"
    - "Yatish Patel"
    - "Gregory Offer"
  summary: "This paper evaluates tab cooling for large-format lithium-ion pouch cells using the Cell Cooling Coefficient, showing that tab thermal resistance limits heat rejection but that increasing tab thickness can significantly improve cooling and reduce cell-wide temperature gradients."
 
 - title: "Towards Optimised Cell Design of Thin Film Silicon-Based Solid-State Batteries via Modelling and Experimental Characterisation"
  year: 2022
  url: "https://iopscience.iop.org/article/10.1149/1945-7111/ac9d08/meta"
  authors:
    - "Pooja Vadhva"
