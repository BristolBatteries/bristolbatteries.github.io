- title: "Advancing state estimation for lithium-ion batteries with hysteresis through systematic extended Kalman filter tuning"
  year: 2024
  url: "https://www.nature.com/articles/s41598-024-61596-0"
  authors:
    - jasper-knox
    - mark-blyth
    - alastair-hales
  summary: "This paper shows that hysteretic reduced-order battery models combined with adaptive extended Kalman filters significantly improve lithium-ion battery state-of-charge estimation, reducing both voltage prediction error and SOC estimation error compared with standard industry approaches."


- title: "A Standardised Potentiometric Method for the Effective Parameterisation of Reversible Heating in a Lithium-Ion Cell"
  year: 2024
  url: "https://iopscience.iop.org/article/10.1149/1945-7111/ad4918/meta"
  authors:
    - alastair-hales
    - james-bulman
  summary: "This paper presents a faster, standardised method for measuring entropy coefficients in lithium-ion cells, improving reversible heat generation modelling while identifying voltage relaxation effects that are important for accurate temperature prediction, safety and lifetime assessment."
  projects:
    - tht

- title: "Lithium-ion battery second life: pathways, challenges and outlook"
  year: 2024
  url: "https://www.frontiersin.org/journals/chemistry/articles/10.3389/fchem.2024.1358417/full"
  authors:
    - "Anisha Patel"
    - "Laura Lander"
    - "Jyoti Ahuja"
    - james-bulman
    - "James Lum"
    - "Julian Pope"
    - alastair-hales
    - "Yatish Patel"
    - "Jacqueline Edge"
  summary: "This review assesses the recycling and second-life pathways available for end-of-life EV batteries, highlighting the need for clearer decision criteria, simplified processes, standardised battery design and supportive policy to improve circularity and sustainability."


  - title: "A Numerical Study of the Suitability of Phase-Change Materials for Battery Thermal Management in Flight Applications"
  year: 2023
  url: "https://www.mdpi.com/2032-6653/14/1/15"
  authors:
    - "Daeyeun Kim"
    - "Saber Abdallah"
    - "Gloria Bosi"
    - alastair-hales
  summary: "This paper numerically demonstrates that phase-change materials can provide passive, low-mass thermal management for electric aircraft battery packs, with latent heat of fusion, rather than thermal conductivity, being the key property for maintaining ideal temperatures during flight."
  
