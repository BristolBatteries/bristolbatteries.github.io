    - "Mei-Chin Pang"
    - "Anisha Patel"
    - "Paul Shearing"
    - "Gregory Offer"
    - "Alexander Rettie"
  summary: "This paper develops and experimentally validates a 2D electro-chemo-mechanical model of a silicon-based thin-film solid-state battery, showing how electrode expansion drives stress, strain and plastic deformation during cycling to inform improved cell design and optimisation."

 - title: "Thermal evaluation of lithium-ion batteries: Defining the cylindrical cell cooling coefficient"
  year: 2022
  url: "https://iopscience.iop.org/article/10.1149/1945-7111/ac9d08/meta"
  authors:
    - "Waseem Marzook"
    - alastair-hales
    - "Yatish Patel"
